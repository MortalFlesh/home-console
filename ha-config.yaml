# Following MQTT settings is deprecated (probably because these are the default values)
#mqtt:
#  discovery: true
#  discovery_prefix: homeassistant

influxdb:
  max_retries: 3
  default_measurement: state
  include:
    entities:
      ## Mortalek
      - person.mortalek
      - sensor.imortalek_average_active_pace
      - sensor.imortalek_steps
      - sensor.imortalek_distance
      - sensor.imortalek_floors_ascended
      - sensor.imortalek_floors_descended
      - sensor.imortalek_battery_level
      - sensor.imortalek_battery_state
      ## Adin
      - person.adin
      - sensor.denisa_iphone_average_active_pace
      - sensor.denisa_iphone_steps
      - sensor.denisa_iphone_distance
      - sensor.denisa_iphone_floors_ascended
      - sensor.denisa_iphone_floors_descended
      - sensor.denisa_iphone_battery_level
      - sensor.denisa_iphone_battery_state

      ## Home Assistant
      ### CPU
      - sensor.processor_use
      - sensor.processor_temperature
      #- light.rpi_cooling_fan
      ### memory
      - sensor.memory_use_percent
      ### HDD
      - sensor.disk_free
      - sensor.disk_use_percent
      - sensor.last_boot

      ## NAS
      - sensor.nasmf_temperature
      - sensor.nasmf_volume_1_average_disk_temp
      - sensor.nasmf_drive_1_temperature
      - sensor.nasmf_drive_2_temperature
      - sensor.nasmf_cpu_utilization_total
      - sensor.nasmf_memory_usage_real
      - sensor.nasmf_volume_1_volume_used
      - sensor.nasmf_volume_1_used_space
      - sensor.nasmf_download_throughput
      - sensor.nasmf_upload_throughput

      ## Weather
      - weather.forecast_doma

      ## Raspberry Pi (Home)
      - sensor.raspberrypi_cpu_usage
      - sensor.raspberrypi_disk_use
      - sensor.raspberrypi_memory_use
      - sensor.raspberrypi_temperature
      ### Raspberry Pi-Hole
      - sensor.pi_hole_ads_blocked_today
      - sensor.pi_hole_ads_percentage_blocked_today
      - sensor.pi_hole_dns_queries_cached
      - sensor.pi_hole_dns_queries_forwarded
      - sensor.pi_hole_dns_queries_today
      - sensor.pi_hole_dns_unique_domains
      - sensor.pi_hole_domains_blocked

      ## TV Skříňka
      # ESP - s větrákem a DHT
      - sensor.tv_skrinka_temperature
      - sensor.tv_skrinka_vlhkost
      - fan.tv_skrinka_vetrak_ha
      - sensor.tv_skrinka_vetrak_ha_rpm
      - fan.tv_skrinka_vetrak_stred
      - sensor.tv_skrinka_vetrak_stred_rpm

      ## Audio Skříňka
      # ESP - s větrákem a DHT
      - sensor.obyvak_audio_skrinka_temperature
      - sensor.obyvak_audio_skrinka_humidity
      - fan.obyvak_audio_skrinka_vetrak_stred
      - sensor.obyvak_audio_skrinka_vetrak_stred_rpm

      ## Obývák klima
      - sensor.obyvak_klima_teplomer
      - sensor.obyvak_klima_vlhkost

      ## Pracovna
      - sensor.pracovna_teplomer
      - sensor.pracovna_vlhkost

      ## Ložnice
      - sensor.loznice_teplomer
      - sensor.loznice_vlhkost
      - sensor.loznice_tlak

      ## Chodba
      #- sensor.chodba_teplomer
      #- sensor.chodba_vlhkost

      ## Trezor
      #- sensor.trezor_teplomer
      #- sensor.trezor_vlhkost

      ## Vrch klima
      - sensor.vrch_klima_teplomer
      - sensor.vrch_klima_vlhkost

      ## Eaton
      - sensor.eaton_obyvaci_pokoj_adjustment
      - sensor.eaton_obyvaci_pokoj_temperature
      - sensor.eaton_obyvaci_pokoj_humidity
      - sensor.eaton_vrch_adjustment
      - sensor.eaton_vrch_temperature

      ### Vrch - podlahovka
      - sensor.eaton_vrch_podlaha_temperature
      - sensor.eaton_vrch_podlaha_power
      - sensor.eaton_vrch_podlaha_power_percentage

      ## iRobot Arnold
      - vacuum.arnold
      - sensor.arnold_battery_level

      ## Router
      - sensor.rt_ac88u_6328_kib_s_received
      - sensor.rt_ac88u_6328_kib_s_sent
      - binary_sensor.rt_ac88u_6328_wan_status
      - sensor.rt_ac88u_6328_wan_status

      # air quality
      - sensor.air_quality_air_quality_index
      - sensor.air_quality_ikea_co
      - sensor.air_quality_pm25
      - sensor.air_quality_teplota
      - sensor.air_quality_vlhkost

      # vrch - panely
      - sensor.shellyplugsg3_54320467c3c8_switch_0_energy
      - sensor.shellyplugsg3_54320467c3c8_switch_0_power

      # vrch - router skrinka
      - sensor.vrch_router_teplomer
      - sensor.vrch_router_vlhkost
      - sensor.vrch_router_vetrak_1_rpm

