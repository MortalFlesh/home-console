  # Eaton - světla
  - light:
    - name: "[Vrch] Gauč světlo"
      default_entity_id: light.eaton_vrch_gauc_svetlo
      level: >-
        {{ (state_attr('sensor.eaton_brightness', 'hdm_xComfort_Adapter_9367063_u0') | int(0)) * 255 / 100 }}
      state: "{{ (state_attr('sensor.eaton_brightness', 'hdm_xComfort_Adapter_9367063_u0') | int(0)) > 0 }}"
      turn_on:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9367063_u0_set_level
          data:
            brightness_pct: 100
      turn_off:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9367063_u0_set_level
          data:
            brightness_pct: 0
      set_level:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9367063_u0_set_level
