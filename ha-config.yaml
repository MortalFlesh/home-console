# Loads default set of integrations. Do not remove.
default_config:

# Text to speech
tts:
  - platform: google_translate

# Enable python scripts
python_script:

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

sensor:
  # Eaton - Vrch/Obývák - termostaty/topení/podlahovka
  - platform: rest
    resource: http://homeassistant.local:28080/sensors
    scan_interval: 60
    name: eaton
    value_template: OK
    json_attributes_path: "$.sensors"
    json_attributes:
      - hdm_xComfort_Adapter_8649687_w
      - hdm_xComfort_Adapter_8649687_u0
      - hdm_xComfort_Adapter_9214125_u0
      - hdm_xComfort_Adapter_4131920_w
      - hdm_xComfort_Adapter_4131920_u0
      - hdm_xComfort_Adapter_4131920_u1
  # Eaton - Stmívatelná světla
  - platform: rest
    resource: http://homeassistant.local:28080/brightness
    scan_interval: 60
    name: eaton_brightness
    value_template: OK
    json_attributes_path: "$.Brightness"
    json_attributes:
      - hdm_xComfort_Adapter_9367063_u0
      - hdm_xComfort_Adapter_4119267_u0
      - hdm_xComfort_Adapter_4119263_u0
      - hdm_xComfort_Adapter_4116923_u0
      - hdm_xComfort_Adapter_4139062_u0
      - hdm_xComfort_Adapter_4203215_u0
      - hdm_xComfort_Adapter_4119299_u0
      #- hdm_xComfort_Adapter_4275181_u0
      - hdm_xComfort_Adapter_4110125_u0
      - hdm_xComfort_Adapter_4139192_u0
      - hdm_xComfort_Adapter_4139113_u0
      - hdm_xComfort_Adapter_3782040_u0
      - hdm_xComfort_Adapter_4201923_u0
      - hdm_xComfort_Adapter_4116920_u0
      - hdm_xComfort_Adapter_4129662_u0

template:
  - sensor:
    # Vrch - termostat/podlahovka
    - unique_id: eaton_vrch_adjustment
      name: "[Vrch] Regulace"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_8649687_w')['temperature'] | float }}"
      unit_of_measurement: "°C"
      device_class: temperature
      default_entity_id: sensor.eaton_vrch_adjustment
    - unique_id: eaton_vrch_temperature
      name: "[Vrch] Teplota"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_8649687_u0')['temperature'] | float }}"
      unit_of_measurement: "°C"
      device_class: temperature
      default_entity_id: sensor.eaton_vrch_temperature
    - unique_id: eaton_vrch_podlaha_temperature # hdm_xComfort_Adapter_9214125_u0_temperature
      name: "[Vrch] Podlaha (temperature)"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_9214125_u0')['temperature'] | float }}"
      unit_of_measurement: "°C"
      device_class: temperature
      default_entity_id: sensor.eaton_vrch_podlaha_temperature
    - unique_id: eaton_vrch_podlaha_power_percentage # hdm_xComfort_Adapter_9214125_u0_power_percentage
      name: "[Vrch] Podlaha (power_percentage)"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_9214125_u0')['power_percentage'] | float }}"
      unit_of_measurement: "%"
      device_class: power_factor
      default_entity_id: sensor.eaton_vrch_podlaha_power_percentage
    - unique_id: eaton_vrch_podlaha_power # hdm_xComfort_Adapter_9214125_u0_power
      name: "[Vrch] Podlaha (power)"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_9214125_u0')['power'] | float }}"
      unit_of_measurement: "W"
      device_class: power
      default_entity_id: sensor.eaton_vrch_podlaha_power
    #- unique_id: hdm_xComfort_Adapter_9214125_u0_overload
    #  name: "Podlaha patro  (Vstup topení) (overload)"
    #  state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_9214125_u0')['overload'] | float }}"
    #  unit_of_measurement: ""
    #  device_class: value

    # Obývák - termostat/topení
    - unique_id: eaton_obyvaci_pokoj_adjustment
      name: "[Obývací pokoj] Regulace"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_4131920_w')['temperature'] | float }}"
      unit_of_measurement: "°C"
      device_class: temperature
      default_entity_id: sensor.eaton_obyvaci_pokoj_adjustment
    - unique_id: eaton_obyvaci_pokoj_temperature
      name: "[Obývací pokoj] Teplota"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_4131920_u0')['temperature'] | float }}"
      unit_of_measurement: "°C"
      device_class: temperature
      default_entity_id: sensor.eaton_obyvaci_pokoj_temperature
    - unique_id: eaton_obyvaci_pokoj_humidity
      name: "[Obývací pokoj] Vlhkost"
      state: "{{ state_attr('sensor.eaton', 'hdm_xComfort_Adapter_4131920_u1')['humidity'] | float }}"
      unit_of_measurement: "%"
      device_class: humidity
      default_entity_id: sensor.eaton_obyvaci_pokoj_humidity

  # Eaton - žaluzie
  - cover:
    - name: "Eaton - [Vrch](velke) Ven. Žaluzie"
      default_entity_id: cover.eaton_vrch_velke_ven_zaluzie
      open_cover:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9429183_u0_open
      close_cover:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9429183_u0_close
      stop_cover:
        - action: rest_command.eaton_hdm_xcomfort_adapter_9429183_u0_stop
