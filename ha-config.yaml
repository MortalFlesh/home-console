rest_command:
  # Eaton - stmívatelná světla
  eaton_hdm_xcomfort_adapter_9367063_u0_set_level:
    url: "http://homeassistant.local:28080/state"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"room": "hz_5", "device": "xCo:9367063_u0", "density": {{ brightness_pct }}}'
  eaton_hdm_xcomfort_adapter_4119267_u0_set_level:
    url: "http://homeassistant.local:28080/state"
    method: POST
